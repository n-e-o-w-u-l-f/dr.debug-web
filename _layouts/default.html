<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'de' }}" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <script>
    (() => {
      const stored = localStorage.getItem("drdebug-theme");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = stored || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-bs-theme", theme);
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ '/assets/css/stammbaum.css' | relative_url }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ '/' | relative_url }}">Dr.Debug Stammbaum</a>
      <span class="navbar-text small me-auto">PROPOSAL_ONLY · Ordner → Branches · Wissenstand-Zähler vorbereitet</span>
      <button class="btn btn-sm btn-outline-secondary ms-2" id="themeToggle" type="button" aria-label="Dark/Light Mode umschalten">
        <span id="themeToggleIcon">◐</span>
        <span id="themeToggleText">Theme</span>
      </button>
    </div>
  </nav>

  <main class="container-fluid py-4">
    {{ content }}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ '/assets/js/stammbaum.js' | relative_url }}"></script>
</body>
</html>
