<!doctype html>
<html lang="{{ site.lang | default: 'de' }}" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description | default: 'Dr.Debug Web' }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/stammbaum_fx.css' | relative_url }}">
</head>
<body class="dd-body">
  <header class="dd-site-header container py-3">
    <a class="dd-brand" href="{{ '/' | relative_url }}">🛠️ Dr.Debug</a>
    <span class="badge text-bg-info">PROPOSAL_ONLY</span>
    <span class="badge text-bg-secondary">Memory ↔ Web Renderer</span>
    <button class="btn btn-sm btn-outline-light ms-auto" type="button" data-dd-theme-toggle>◐ Theme</button>
  </header>

  <main class="container pb-5">
    {{ content }}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ '/assets/js/stammbaum_fx.js' | relative_url }}" defer></script>
</body>
</html>
